<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tri · Dic 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#18180f;--paper:#f4f1ea;--paper2:#ede9df;--paper3:#e4dfd2;
  --line:rgba(24,24,15,.1);--line2:rgba(24,24,15,.18);
  --swim:#1a5fa8;--bike:#7a4a08;--run:#1a6e48;--gym:#4a30a0;--rest:#b0aa99;
  --serif:'Instrument Serif',Georgia,serif;--mono:'DM Mono',monospace;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:var(--mono);background:var(--paper);color:var(--ink);font-size:16px;line-height:1.5;max-width:640px;margin:0 auto}

/* ── HEADER ── */
.hdr{padding:22px 24px 16px;background:var(--paper)}
.hdr-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}
.hdr-event{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--rest)}
.hdr-days{font-size:11px;letter-spacing:.06em;color:var(--rest);white-space:nowrap}
.hdr-days strong{color:var(--ink);font-weight:500}
.hdr-date{font-family:var(--serif);font-size:34px;font-style:italic;font-weight:400;color:var(--ink);line-height:1.1;margin-bottom:12px}
.hdr-quote{border-left:2px solid var(--line2);padding-left:12px}
.hdr-quote-text{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--ink);line-height:1.5;opacity:.8}
.hdr-quote-author{font-size:11px;letter-spacing:.04em;color:var(--rest);margin-top:3px}

/* ── PROGRESS ── */
.prog-wrap{padding:0 24px;margin-top:16px}
.prog-bg{height:2px;background:var(--line);border-radius:1px;overflow:hidden}
.prog-fill{height:100%;background:var(--ink);border-radius:1px;transition:width .6s ease}
.prog-meta{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;letter-spacing:.04em;color:var(--rest)}
.prog-meta strong{color:var(--ink);font-weight:500}

/* ── DIVIDER ── */
.divider{margin:18px 24px;height:1px;background:var(--line)}

/* ── TODAY ── */
.today-wrap{padding:0 24px}
.section-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--rest);margin-bottom:10px}

.today-card{background:var(--ink);border-radius:var(--r);padding:20px 20px 18px;display:flex;align-items:flex-start;gap:16px;transition:transform .1s;user-select:none}
.today-card.done{background:var(--run)}
.today-card.rest-today{background:var(--paper3)}
.today-card:not(.rest-today){cursor:pointer}
.today-card:not(.rest-today):active{transform:scale(.985)}

.today-check{width:48px;height:48px;border-radius:50%;border:2px solid rgba(255,255,255,.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px;cursor:pointer}
.today-card.done .today-check{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.12)}
.today-card.rest-today .today-check{border-color:var(--line2);background:none;cursor:default}
.chk-icon{width:16px;height:10px;border-left:2.5px solid transparent;border-bottom:2.5px solid transparent;transform:rotate(-45deg) translate(1px,-1px);transition:border-color .2s}
.today-card.done .chk-icon{border-left-color:rgba(255,255,255,.9);border-bottom-color:rgba(255,255,255,.9)}
.today-card.rest-today .chk-icon{border-left-color:var(--rest);border-bottom-color:var(--rest)}

.today-info{flex:1;min-width:0}
.today-type{font-family:var(--serif);font-size:24px;font-style:italic;font-weight:400;color:#fff;line-height:1.1;margin-bottom:8px}
.today-card.rest-today .today-type{color:var(--rest)}

/* ── INLINE LOG ROW ── */
.log-row{display:flex;align-items:center;gap:8px}
.log-row.hidden{display:none}
.log-input{
  width:72px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
  border-radius:6px;padding:5px 10px;font-family:var(--mono);font-size:16px;
  color:#fff;text-align:right;outline:none;transition:border-color .15s;
  -moz-appearance:textfield;
}
.log-input::-webkit-outer-spin-button,.log-input::-webkit-inner-spin-button{-webkit-appearance:none}
.log-input::placeholder{color:rgba(255,255,255,.3)}
.log-input:focus{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.18)}
.today-card.done .log-input{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3)}
.log-sep{font-size:14px;color:rgba(255,255,255,.3)}
.log-target-txt{font-size:14px;color:rgba(255,255,255,.45);letter-spacing:.02em}
.today-card.rest-today .log-target-txt{color:var(--rest)}

.today-streak{text-align:right;flex-shrink:0}
.streak-num{font-size:26px;font-weight:400;color:rgba(255,255,255,.9);display:block;line-height:1}
.streak-lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.today-card.rest-today .streak-num{color:var(--ink)}
.today-card.rest-today .streak-lbl{color:var(--rest)}

/* ── WEEK STRIP ── */
.week-section{padding:0 24px;margin-top:18px}
.week-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.week-meta{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--rest)}
.week-nav-btns{display:flex;gap:6px}
.wnb{background:none;border:1px solid var(--line2);border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;color:var(--ink);font-family:var(--mono);transition:background .1s}
.wnb:active{background:var(--paper2)}
.week-days{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.wd{border-radius:9px;padding:9px 3px;text-align:center;cursor:pointer;border:1px solid transparent;transition:all .15s}
.wd.is-rest{opacity:.38;cursor:default}
.wd.is-today{border-color:var(--ink)}
.wd.is-selected:not(.is-today){border-color:var(--ink);border-style:dashed;opacity:.85}
.wd.is-done{background:var(--ink)}
.wd-name{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--rest);margin-bottom:5px}
.wd.is-done .wd-name{color:rgba(255,255,255,.5)}
.wd.is-today:not(.is-done) .wd-name{color:var(--ink)}
.wd-dot{width:7px;height:7px;border-radius:50%;margin:0 auto 4px;background:var(--line2)}
.wd.is-done .wd-dot{background:rgba(255,255,255,.55)}
.wd.is-today:not(.is-done) .wd-dot{background:var(--ink)}
.wd-tag{font-size:9px;color:var(--rest);letter-spacing:.03em}
.wd.is-done .wd-tag{color:rgba(255,255,255,.45)}
.wd.is-today:not(.is-done) .wd-tag{color:var(--ink)}

/* ── FLOATING BACK-TO-TODAY ── */
.back-btn{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:rgba(255,255,255,.9);border:none;border-radius:20px;
  padding:10px 20px;font-family:var(--mono);font-size:12px;letter-spacing:.06em;
  cursor:pointer;display:none;z-index:200;
  box-shadow:0 4px 16px rgba(24,24,15,.25);
  transition:opacity .2s,transform .2s;
  white-space:nowrap;
}
.back-btn.visible{display:block}
.back-btn:active{opacity:.8;transform:translateX(-50%) scale(.96)}

/* ── HITOS ── */
.hitos-section{padding:0 24px;margin-top:8px}
.section-toggle{width:100%;background:none;border:none;border-top:1px solid var(--line);padding:14px 0;font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--rest);cursor:pointer;display:flex;justify-content:space-between;align-items:center;text-align:left}
.t-arrow{transition:transform .2s;font-size:12px;opacity:.6}
.t-arrow.open{transform:rotate(180deg)}
.hito-body{display:none;padding-bottom:14px}
.hito-body.open{display:block}
.hito-row{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.hito-row:last-child{border-bottom:none}
.hc{width:20px;height:20px;flex-shrink:0;border-radius:50%;border:1.5px solid var(--line2);cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .15s}
.hc.on{background:var(--ink);border-color:var(--ink)}
.hc.on::after{content:'';display:block;width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}
.hito-content{flex:1}
.hito-month{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--rest)}
.hito-text{font-size:14px;line-height:1.4;margin-top:2px}
.hito-row.done .hito-text{color:var(--rest);text-decoration:line-through}

/* ── STATS ── */
.stats-section{padding:0 24px;margin-top:0}
.stats-body{display:none;padding-bottom:24px}
.stats-body.open{display:block}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
.stat-box{background:var(--paper2);border-radius:9px;padding:12px 12px 10px}
.stat-val{font-size:22px;font-weight:400;color:var(--ink);line-height:1}
.stat-lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--rest);margin-top:4px}
.disc-rows{display:flex;flex-direction:column;gap:9px}
.disc-r{display:flex;align-items:center;gap:10px}
.disc-name{font-size:13px;min-width:72px;color:var(--ink)}
.disc-bar-bg{flex:1;height:3px;background:var(--line);border-radius:2px;overflow:hidden}
.disc-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.disc-val{font-size:11px;color:var(--rest);min-width:60px;text-align:right}

.bottom-space{height:40px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <span class="hdr-event">Triatlón Olímpico · 19 dic 2026</span>
    <span class="hdr-days" id="hdr-days">— días</span>
  </div>
  <div class="hdr-date" id="hdr-date">—</div>
  <div class="hdr-quote">
    <div class="hdr-quote-text" id="quote-text">—</div>
    <div class="hdr-quote-author" id="quote-author">—</div>
  </div>
</div>

<!-- PROGRESS -->
<div class="prog-wrap">
  <div class="prog-bg"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-meta"><span id="prog-left">—</span><strong id="prog-pct">0%</strong></div>
</div>

<div class="divider"></div>

<!-- TODAY -->
<div class="today-wrap">
  <div class="section-label" id="today-label">hoy</div>
  <div class="today-card" id="today-card" onclick="cardTap(event)">
    <div class="today-check" id="today-check" onclick="checkTap(event)">
      <div class="chk-icon"></div>
    </div>
    <div class="today-info">
      <div class="today-type" id="today-type">—</div>
      <div class="log-row" id="log-row">
        <input class="log-input" id="log-input" type="number" min="0" step="0.1"
          placeholder="0"
          oninput="logChanged(this.value)"
          onblur="logBlur()">
        <span class="log-sep">/</span>
        <span class="log-target-txt" id="log-target-txt">—</span>
      </div>
    </div>
    <div class="today-streak">
      <span class="streak-num" id="streak-num">0</span>
      <span class="streak-lbl">racha</span>
    </div>
  </div>
</div>

<!-- WEEK STRIP -->
<div class="week-section">
  <div class="week-header">
    <div class="week-meta" id="week-meta">semana —</div>
    <div class="week-nav-btns">
      <button class="wnb" onclick="changeWeek(-1)">←</button>
      <button class="wnb" onclick="changeWeek(1)">→</button>
    </div>
  </div>
  <div class="week-days" id="week-days"></div>
</div>

<!-- STATS -->
<div class="stats-section">
  <button class="section-toggle" onclick="togglePanel('stats')">
    <span>Estadísticas</span>
    <span class="t-arrow" id="stats-arrow">↓</span>
  </button>
  <div class="stats-body" id="stats-body"></div>
</div>

<!-- HITOS -->
<div class="hitos-section">
  <button class="section-toggle" onclick="togglePanel('hitos')">
    <span>Hitos del plan <span id="hito-count"></span></span>
    <span class="t-arrow" id="hito-arrow">↓</span>
  </button>
  <div class="hito-body" id="hito-body"></div>
</div>

<!-- COMPETENCIA -->
<div class="stats-section">
  <button class="section-toggle" onclick="togglePanel('race')">
    <span>¿Qué competencia es?</span>
    <span class="t-arrow" id="race-arrow">↓</span>
  </button>
  <div class="stats-body" id="race-body">
    <div style="padding-bottom:20px">
      <p style="font-size:13px;line-height:1.6;color:var(--ink);margin-bottom:10px">La carrera es el <strong>Triatlón de Zapallar (TDZ)</strong>, una de las competencias más icónicas de Chile. Distancia olímpica: 1500m natación · 40km bicicleta · 10km trote.</p>
      <a href="https://www.tdz.cl/la-carrera/" target="_blank" rel="noopener"
        style="display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:#fff;text-decoration:none;border-radius:8px;padding:9px 14px;font-family:var(--mono);font-size:11px;letter-spacing:.06em;">
        Ver competencia →
      </a>
    </div>
  </div>
</div>

<div class="bottom-space"></div>

<!-- FLOATING BACK TO TODAY -->
<button class="back-btn" id="back-btn" onclick="goToToday()">↑ Semana actual</button>

<script>
// ── QUOTES ────────────────────────────────────────────────────
const QUOTES = [
  {t:"Nadie golpea tan fuerte como la vida. Pero no importa lo fuerte que golpeas, sino lo fuerte que pueden golpearte y seguir avanzando.",a:"Rocky Balboa"},
  {t:"Hazlo o no lo hagas, pero no lo intentes.",a:"Yoda"},

  {t:"Los tiempos difíciles nunca duran, pero las personas fuertes sí.",a:"Robert Schuller"},
  {t:"Nunca, nunca, nunca te rindas.",a:"Winston Churchill"},
  {t:"Si te cansas, aprende a descansar, no a rendirte.",a:"Banksy"},

  {t:"Si el plan no funciona, cambia el plan, pero no cambies la meta.",a:"Anónimo"},

  {t:"La vida se mueve muy rápido. Si no te detienes y miras a tu alrededor de vez en cuando, podrías perdértela.",a:"Ferris Bueller"},

// ── CONSTANTS ─────────────────────────────────────────────────
const PLAN_START = new Date(2026,4,4); // lunes 4 mayo 2026
const RACE_DATE  = new Date(2026,11,19);
const TOTAL_WEEKS = 33;
const DAY_NAMES  = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

const HITOS = [
  {month:'Mayo',      text:'200m de natación continuos con técnica aceptable'},
  {month:'Junio',     text:'Trote + bici en la misma semana sin dolor en el tobillo'},
  {month:'Julio',     text:'500m de natación continuos'},
  {month:'Agosto',    text:'Primer ladrillo bici + trote completado'},
  {month:'Septiembre',text:'Base aeróbica mantenida corriendo en Europa'},
  {month:'Octubre',   text:'Simulacro parcial — mitad de distancias'},
  {month:'Noviembre', text:'Simulacro completo a ritmo fácil'},
  {month:'Diciembre', text:'Línea de llegada — triatlón olímpico completado'}
];

// ── PROGRESSIVE PLAN ──────────────────────────────────────────
function swimT(w){if(w<=2)return[200,'m'];if(w<=4)return[300,'m'];if(w<=6)return[400,'m'];if(w<=9)return[500,'m'];if(w<=11)return[600,'m'];if(w<=13)return[700,'m'];if(w<=15)return[800,'m'];if(w<=18)return[1000,'m'];if(w<=22)return[800,'m'];if(w<=27)return[1000,'m'];if(w<=30)return[1000,'m'];if(w<=31)return[800,'m'];return[600,'m'];}
function bikeT(w){if(w<=3)return[15,'km'];if(w<=6)return[20,'km'];if(w<=9)return[25,'km'];if(w<=12)return[28,'km'];if(w<=15)return[32,'km'];if(w<=18)return[35,'km'];if(w<=27)return[30,'km'];if(w<=30)return[25,'km'];return[20,'km'];}
function bikeLT(w){if(w<=3)return[25,'km'];if(w<=6)return[30,'km'];if(w<=9)return[35,'km'];if(w<=12)return[40,'km'];if(w<=15)return[45,'km'];if(w<=18)return[50,'km'];if(w<=27)return[55,'km'];if(w<=30)return[40,'km'];return[25,'km'];}
function runT(w){if(w<=3)return[5,'km'];if(w<=6)return[6,'km'];if(w<=15)return[7,'km'];if(w<=18)return[7,'km'];return[6,'km'];}

function weekPlan(w){
  const vac=(w>=19&&w<=22);
  if(vac)return[
    {tag:'run', label:'Trote Europa',  tv:runT(w)},
    {tag:'rest',label:'Descanso',      tv:null},
    {tag:'rest',label:'Descanso',      tv:null},
    {tag:'run', label:'Trote Europa',  tv:[5,'km']},
    {tag:'run', label:'Trote Europa',  tv:[6,'km']},
    {tag:'rest',label:'Descanso',      tv:null},
    {tag:'run', label:'Trote largo',   tv:[8,'km']},
  ];
  return[
    {tag:'swim',label:'Natación',     tv:swimT(w)},
    {tag:'gym', label:'Gimnasio',     tv:null},
    {tag:'rest',label:'Descanso',     tv:null},
    {tag:'bike',label:'Bicicleta',    tv:bikeT(w)},
    {tag:'run', label:'Trote suave',  tv:runT(w)},
    {tag:'rest',label:'Descanso',     tv:null},
    {tag:'bike',label:'Sesión larga', tv:bikeLT(w)},
  ];
}

// Target display string
function tvStr(tv){return tv?tv[0]+' '+tv[1]:'';}

// ── STATE ─────────────────────────────────────────────────────
let S={done:{},logged:{},hitos:{},curWeek:1,selWeek:null,selDay:null};
function save(){try{localStorage.setItem('tri26v4',JSON.stringify(S));}catch(e){}}
function load(){try{const r=localStorage.getItem('tri26v4');if(r)S={...S,...JSON.parse(r)};}catch(e){}}

function todayWeek(){
  const d=Math.floor((Date.now()-PLAN_START)/(7*864e5))+1;
  return Math.max(1,Math.min(TOTAL_WEEKS,d));
}
function todayDayIdx(){
  // Mon=0 … Sun=6, matching weekPlan order
  return (new Date().getDay()+6)%7;
}
function weekDates(w){
  return Array.from({length:7},(_,i)=>{const d=new Date(PLAN_START);d.setDate(d.getDate()+(w-1)*7+i);return d;});
}
function fd(d){return d.toLocaleDateString('es-CL',{day:'numeric',month:'long',year:'numeric'});}
function fds(d){return d.toLocaleDateString('es-CL',{day:'numeric',month:'short'});}
function sk(w,i){return w+'_'+i;}
function isDone(w,i){return !!S.done[sk(w,i)];}
function getLogged(w,i){return S.logged[sk(w,i)];}

function dailyQuote(){
  const now=new Date();
  const soy=new Date(now.getFullYear(),0,1);
  const doy=Math.floor((now-soy)/864e5);
  return QUOTES[doy%QUOTES.length];
}

function calcStreak(){
  const now=new Date();now.setHours(23,59,59);
  let streak=0;
  const flat=[];
  for(let w=1;w<=TOTAL_WEEKS;w++){
    weekDates(w).forEach((date,i)=>{
      if(weekPlan(w)[i].tag!=='rest') flat.push({w,i,date});
    });
  }
  flat.sort((a,b)=>b.date-a.date);
  for(const{w,i,date}of flat){
    if(date>now)continue;
    if(isDone(w,i))streak++;
    else break;
  }
  return streak;
}

function calcStats(){
  let tS=0,dS=0;
  const vol={swim:{d:0,t:0},bike:{d:0,t:0},run:{d:0,t:0}};
  for(let w=1;w<=TOTAL_WEEKS;w++){
    weekPlan(w).forEach((day,i)=>{
      if(day.tag==='rest')return;
      if(day.tag==='gym'){tS++;if(isDone(w,i))dS++;return;}
      tS++;
      const tv=day.tv;
      if(tv&&vol[day.tag]){
        vol[day.tag].t+=tv[0];
        if(isDone(w,i)){
          dS++;
          const l=parseFloat(getLogged(w,i));
          vol[day.tag].d+=isNaN(l)?tv[0]:l;
        }
      }
    });
  }
  return{tS,dS,vol};
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  const now=new Date();
  const tw=todayWeek();
  const di=todayDayIdx();

  // Ensure selWeek/selDay are initialized
  if(S.selWeek===null||S.selDay===null){S.selWeek=tw;S.selDay=di;}

  // Header
  const dLeft=Math.max(0,Math.ceil((RACE_DATE-now)/864e5));
  document.getElementById('hdr-days').innerHTML='<strong>'+dLeft+'</strong> días';
  document.getElementById('hdr-date').textContent=fd(now);
  const q=dailyQuote();
  document.getElementById('quote-text').textContent='\u201c'+q.t+'\u201d';
  document.getElementById('quote-author').textContent='\u2014 '+q.a;

  // Progress
  const{tS,dS,vol}=calcStats();
  const pct=tS>0?Math.round(dS/tS*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-left').textContent=dS+' de '+tS+' sesiones';

  // Panel — operates on selected day
  renderPanel();

  // Week strip
  renderWeek(tw,di);

  // Floating button
  document.getElementById('back-btn').classList.toggle('visible',S.curWeek!==tw);

  // Hitos count
  const hDone=Object.values(S.hitos).filter(Boolean).length;
  document.getElementById('hito-count').textContent='('+hDone+'/'+HITOS.length+')';
  renderHitos();

  // Stats if open
  if(document.getElementById('stats-body').classList.contains('open')) renderStats(vol,tS,dS,calcStreak(),pct);
}

function renderPanel(){
  const tw=todayWeek(),di=todayDayIdx();
  const sw=S.selWeek,sd=S.selDay;
  const tp=weekPlan(sw)[sd];
  const done=isDone(sw,sd);
  const isRest=tp.tag==='rest';
  const isGym=tp.tag==='gym';
  const hasTarget=!isRest&&!isGym&&tp.tv;
  const isToday=(sw===tw&&sd===di);

  // Label: "hoy" vs date
  const selDate=weekDates(sw)[sd];
  const labelTxt=isToday?'hoy · '+fds(selDate):fds(selDate)+' · tap para editar';
  document.getElementById('today-label').textContent=labelTxt;

  document.getElementById('today-type').textContent=isRest?'Día libre — recarga':tp.label;
  document.getElementById('streak-num').textContent=calcStreak();

  const card=document.getElementById('today-card');
  card.className='today-card'+(done?' done':'')+(isRest?' rest-today':'');

  const logRow=document.getElementById('log-row');
  const logInput=document.getElementById('log-input');
  if(hasTarget){
    logRow.classList.remove('hidden');
    const logVal=getLogged(sw,sd);
    logInput.value=logVal!==undefined?logVal:'';
    document.getElementById('log-target-txt').textContent='/ '+tvStr(tp.tv);
  } else {
    logRow.classList.add('hidden');
  }
}

function renderWeek(tw,di){
  const w=S.curWeek;
  const dates=weekDates(w);
  const plan=weekPlan(w);
  document.getElementById('week-meta').textContent='semana '+w+'/'+TOTAL_WEEKS+' · '+fds(dates[0])+'–'+fds(dates[6]);
  const el=document.getElementById('week-days');el.innerHTML='';
  plan.forEach((day,i)=>{
    const done=isDone(w,i);
    const isToday=(w===tw&&i===di);
    const isSel=(w===S.selWeek&&i===S.selDay);
    const isRest=day.tag==='rest';
    const div=document.createElement('div');
    div.className='wd'+(isRest?' is-rest':'')+(isToday?' is-today':'')+(isSel&&!isToday?' is-selected':'')+(done?' is-done':'');
    const tag=day.tag==='swim'?'nat':day.tag==='bike'?'bici':day.tag==='run'?'run':day.tag==='gym'?'gym':'·';
    div.innerHTML='<div class="wd-name">'+DAY_NAMES[i]+'</div><div class="wd-dot"></div><div class="wd-tag">'+tag+'</div>';
    if(!isRest) div.onclick=()=>selectDay(w,i);
    el.appendChild(div);
  });
}

function renderHitos(){
  const list=document.getElementById('hito-body');list.innerHTML='';
  HITOS.forEach((h,i)=>{
    const done=!!S.hitos[i];
    const row=document.createElement('div');
    row.className='hito-row'+(done?' done':'');
    row.innerHTML='<div class="hc'+(done?' on':'')+'" onclick="toggleHito('+i+')"></div><div class="hito-content"><div class="hito-month">'+h.month+'</div><div class="hito-text">'+h.text+'</div></div>';
    list.appendChild(row);
  });
}

function renderStats(vol,tS,dS,streak,pct){
  const swimPct=vol.swim.t>0?Math.round(vol.swim.d/vol.swim.t*100):0;
  const bikePct=vol.bike.t>0?Math.round(vol.bike.d/vol.bike.t*100):0;
  const runPct=vol.run.t>0?Math.round(vol.run.d/vol.run.t*100):0;
  const fv=(v,tag)=>tag==='swim'?Math.round(v)+'m':(Math.round(v*10)/10)+'km';
  document.getElementById('stats-body').innerHTML=`
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-val">${dS}</div><div class="stat-lbl">sesiones</div></div>
      <div class="stat-box"><div class="stat-val">${streak}</div><div class="stat-lbl">racha</div></div>
      <div class="stat-box"><div class="stat-val">${pct}%</div><div class="stat-lbl">del plan</div></div>
    </div>
    <div class="disc-rows">
      <div class="disc-r"><span class="disc-name">Natación</span><div class="disc-bar-bg"><div class="disc-bar-fill" style="width:${swimPct}%;background:var(--swim)"></div></div><span class="disc-val">${fv(vol.swim.d,'swim')} / ${fv(vol.swim.t,'swim')}</span></div>
      <div class="disc-r"><span class="disc-name">Bicicleta</span><div class="disc-bar-bg"><div class="disc-bar-fill" style="width:${bikePct}%;background:var(--bike)"></div></div><span class="disc-val">${fv(vol.bike.d,'bike')} / ${fv(vol.bike.t,'bike')}</span></div>
      <div class="disc-r"><span class="disc-name">Trote</span><div class="disc-bar-bg"><div class="disc-bar-fill" style="width:${runPct}%;background:var(--run)"></div></div><span class="disc-val">${fv(vol.run.d,'run')} / ${fv(vol.run.t,'run')}</span></div>
    </div>`;
}

// ── INTERACTIONS ──────────────────────────────────────────────
// Select a day from the week strip → update panel
function selectDay(w,i){
  S.selWeek=w; S.selDay=i; save();
  renderPanel();
  renderWeek(todayWeek(),todayDayIdx());
}

// Tap anywhere on panel card → focus input
function cardTap(e){
  const tp=weekPlan(S.selWeek)[S.selDay];
  if(tp.tag==='rest')return;
  if(e.target.closest('.today-check')||e.target===document.getElementById('log-input'))return;
  const inp=document.getElementById('log-input');
  if(inp&&!document.getElementById('log-row').classList.contains('hidden')) inp.focus();
}

// Check button: toggle done for selected day
function checkTap(e){
  e.stopPropagation();
  const sw=S.selWeek,sd=S.selDay;
  const tp=weekPlan(sw)[sd];
  if(tp.tag==='rest')return;
  const k=sk(sw,sd);
  const wasDone=isDone(sw,sd);
  S.done[k]=!wasDone;
  if(!wasDone&&tp.tv&&(getLogged(sw,sd)===undefined||getLogged(sw,sd)==='')){
    S.logged[k]=tp.tv[0];
    document.getElementById('log-input').value=tp.tv[0];
  }
  save();render();
}

// Inline log input — saves for selected day
function logChanged(val){
  S.logged[sk(S.selWeek,S.selDay)]=val;
  save();
}
function logBlur(){save();}

function toggleHito(i){
  S.hitos[i]=!S.hitos[i];save();
  const hDone=Object.values(S.hitos).filter(Boolean).length;
  document.getElementById('hito-count').textContent='('+hDone+'/'+HITOS.length+')';
  renderHitos();
}

function changeWeek(d){
  S.curWeek=Math.max(1,Math.min(TOTAL_WEEKS,S.curWeek+d));
  // When navigating to a new week, pre-select first non-rest day of that week
  const plan=weekPlan(S.curWeek);
  const firstActive=plan.findIndex(day=>day.tag!=='rest');
  if(firstActive>=0){S.selWeek=S.curWeek;S.selDay=firstActive;}
  save();render();
}

function goToToday(){
  S.curWeek=todayWeek();
  S.selWeek=todayWeek();S.selDay=todayDayIdx();
  save();render();
  document.getElementById('back-btn').classList.remove('visible');
}

function togglePanel(id){
  const body=document.getElementById(id+'-body')||document.getElementById(id===('hitos')?'hito-body':'stats-body');
  const arrow=document.getElementById(id===('hitos')?'hito-arrow':'stats-arrow');
  const isOpen=body.classList.toggle('open');
  arrow.classList.toggle('open',isOpen);
  if(id==='stats'&&isOpen){
    const{tS,dS,vol}=calcStats();
    renderStats(vol,tS,dS,calcStreak(),tS>0?Math.round(dS/tS*100):0);
  }
}

function togglePanel(id){
  const bodyMap={hitos:'hito-body',stats:'stats-body',race:'race-body'};
  const arrowMap={hitos:'hito-arrow',stats:'stats-arrow',race:'race-arrow'};
  const body=document.getElementById(bodyMap[id]);
  const arrow=document.getElementById(arrowMap[id]);
  if(!body||!arrow)return;
  const isOpen=body.classList.toggle('open');
  arrow.classList.toggle('open',isOpen);
  if(id==='stats'&&isOpen){
    const{tS,dS,vol}=calcStats();
    renderStats(vol,tS,dS,calcStreak(),tS>0?Math.round(dS/tS*100):0);
  }
  if(id==='hitos'&&isOpen) renderHitos();
}

// ── INIT ──────────────────────────────────────────────────────
load();
S.curWeek=todayWeek();
if(S.selWeek===null||S.selDay===null){S.selWeek=todayWeek();S.selDay=todayDayIdx();}
render();
</script>
